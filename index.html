<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 100px;
            margin: 0;
        }

        h2 {
            margin: 10px 0;
            font-size: 28px;
        }

        p {
            color: #ddd;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
            color: #fff;
            background: #ff4b2b;
            padding: 12px 25px;
            border-radius: 25px;
            transition: 0.3s;
        }

        a:hover {
            background: #ff416c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
    <a href="/">Go Back Home</a>
</div>

</body>
</html>
